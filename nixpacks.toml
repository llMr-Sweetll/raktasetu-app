providers = []

[phases.setup]
nixPkgs = ["nodejs_20"]

# Install+build after source COPY so node_modules is not wiped
[phases.install]
cmds = ["echo 'deps install deferred to build'"]

[phases.build]
cmds = [
  "cd backend && npm ci --omit=dev",
  "cd frontend && npm ci && npm run build"
]

[start]
cmds = ["cd backend && npm start"]
