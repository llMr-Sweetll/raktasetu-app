name: Feature request
description: Propose a product or ops improvement
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or operator pain does this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Desired behavior; link any docs/superpowers spec if useful
    validations:
      required: true
  - type: textarea
    id: out-of-scope
    attributes:
      label: Explicitly out of scope
      description: Avoid compliance claims unless counsel-backed
