name: Frontend Build Check

# GitHub Pages hosting retired — app is served from Railway (Express + frontend/dist).
# This workflow only verifies the frontend still builds.

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-deploy.yml'
  pull_request:
    paths:
      - 'frontend/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          VITE_APP_VERSION: ${{ github.sha }}
          # Empty = same-origin /api (Railway unified hosting)
          VITE_API_URL: ''

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Public responsive smoke tests
        run: npm run test:e2e
