name: Frontend CI

# GitHub Pages / Cloudflare hosting retired — SPA is served from Railway (Express + frontend/dist).
# This workflow verifies lint, unit tests, production build, Playwright smoke tests,
# and the local-stack KLE demo full-loop (test Postgres only — never production Neon).

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'backend/scripts/seed-fixtures.js'
      - 'backend/src/routes/hospital.js'
      - 'backend/src/routes/donor.js'
      - 'backend/db/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'backend/scripts/seed-fixtures.js'
      - 'backend/src/routes/hospital.js'
      - 'backend/src/routes/donor.js'
      - 'backend/db/**'
      - '.github/workflows/frontend-ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          VITE_APP_VERSION: ${{ github.sha }}
          # Empty = same-origin /api (Railway unified hosting)
          VITE_API_URL: ''

      - name: Install Playwright browsers
        # mobile project uses WebKit (iPhone 13 device); desktop uses Chromium
        run: npx playwright install --with-deps chromium webkit

      - name: Public responsive smoke tests
        run: npm run test:e2e

  full-loop:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: raktasetu_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/raktasetu_test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/raktasetu_test
      FIXTURE_PASSWORD: test-fixture-pass-12
      JWT_SECRET: ci-e2e-jwt-secret-not-for-production
      PORT: '3001'
      FRONTEND_ORIGINS: http://127.0.0.1:5173,http://localhost:5173
      E2E_FULL: '1'
      CI: 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            ./frontend/package-lock.json
            ./backend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium

      - name: Full-loop e2e (migrate + fixtures + Playwright)
        working-directory: ./frontend
        run: npm run test:e2e:full
